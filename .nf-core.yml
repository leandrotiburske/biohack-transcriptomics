repository_type: pipeline

nf_core_version: 3.5.2

lint:
  files_unchanged:
    - .github/CONTRIBUTING.md
    - .prettierignore
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/ISSUE_TEMPLATE/feature_request.yml
    - .github/PULL_REQUEST_TEMPLATE.md
    - .github/workflows/branch.yml
    - .github/workflows/linting_comment.yml
    - .github/workflows/linting.yml
    - .github/CONTRIBUTING.md
    - .github/.dockstore.yml
    - LICENSE
    - .prettierignore
    - .prettierignore
    - CODE_OF_CONDUCT.md
    - assets/nf-core-biohack-transcriptomics_logo_light.png
    - docs/images/nf-core-biohack-transcriptomics_logo_light.png
    - docs/images/nf-core-biohack-transcriptomics_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/CONTRIBUTING.md
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
    - .github/CONTRIBUTING.md
    - assets/sendmail_template.txt
    - .prettierignore
    - .prettierignore
  modules_config: false
  nextflow_config: false
  multiqc_config: false
  files_exist:
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/ISSUE_TEMPLATE/feature_request.yml
    - .github/PULL_REQUEST_TEMPLATE.md
    - .github/CONTRIBUTING.md
    - .github/.dockstore.yml
    - LICENSE
    - docs/output.md
    - docs/README.md
    - docs/usage.md
    - conf/base.config
    - conf/modules.config
    - modules.json
    - CODE_OF_CONDUCT.md
    - assets/nf-core-biohack-transcriptomics_logo_light.png
    - docs/images/nf-core-biohack-transcriptomics_logo_light.png
    - docs/images/nf-core-biohack-transcriptomics_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml
    - assets/multiqc_config.yml
    - conf/igenomes.config
    - CHANGELOG.md
    - CITATIONS.md
    - .prettierignore
    - .prettierrc.yml
    - nextflow_schema.json
    - assets/email_template.html
    - assets/sendmail_template.txt
    - assets/email_template.txt
  readme:
    - nextflow_badge
    - nextflow_badge
    - nfcore_template_badge
  nfcore_components: false
  schema_lint: false
  schema_params: false
  schema_description: false
  modules_json: false
  base_config: false
  included_configs: false

template:
  org: nf-core
  name: biohack-transcriptomics
  description: nf-core pipeline for the BITS Hackathon 2026
  author: Team 1
  version: 1.0.0dev
  force: true
  outdir: .
  skip_features:
    - github
    - github_badges
    - changelog
    - license
    - igenomes
    - modules
    - multiqc
    - fastqc
    - nf_schema
    - nf_core_configs
    - seqera_platform
    - gpu
    - codespaces
    - vscode
    - code_linters
    - citations
    - documentation
    - rocrate
    - email
    - adaptivecard
    - slackreport
  is_nfcore: false
